# ============================================================
# LoRA Fine-tuning Config — InternVL3.5-4B-Flash
# ============================================================
# Used by: student_training/scripts/train_lora.py
# Purpose: Fine-tune InternVL3.5-4B-Flash with LoRA adapters
#          on teacher-distilled collision anticipation data.
#          Combined loss: BCE (score) + CE (reasoning).
#
# VRAM requirement: ~16 GB  (RunPod RTX 4090 24 GB recommended)

# ── Model ────────────────────────────────────────────────────
model_id: "OpenGVLab/InternVL3_5-4B-Flash"
torch_dtype: "bfloat16"        # bf16 for RTX/A-series; use float16 for older cards

# ── LoRA ─────────────────────────────────────────────────────
# Only the LLM backbone is trained; vision encoder stays frozen.
lora_r: 16
lora_alpha: 32                 # effective scale = lora_alpha / lora_r = 2.0
lora_dropout: 0.1
lora_target_modules:           # attention + MLP projections in the LLM backbone
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# ── Input format ─────────────────────────────────────────────
window_size: 16                # frames per clip (must match Teacher manifest)
frame_size: 448                # InternVL native resolution (pixels)
frame_filename_pattern: "frame_{:05d}.jpg"   # e.g. frame_00042.jpg
max_seq_len: 8192              # max tokenized length (image tokens + text)
# Memory note: 16 images × 256 tokens/img = 4096 vis tokens (ViR, downsample_ratio=0.5)
#   OR        16 images × 64  tokens/img = 1024 vis tokens (downsample_ratio=0.25)
# + ~30 (header) + ~500 (PROMPT_G) + ~300 (reasoning) ≈ 1854–4926 total
# 8192 is a safe upper bound for either case.  With gradient checkpointing
# the activation memory overhead is small.

# ── Loss ─────────────────────────────────────────────────────
# Combined loss = loss_alpha * BCE(score_pred, label)
#               + (1 - loss_alpha) * CE(reasoning_tokens, target_tokens)
loss_alpha: 0.5

# ── Training ─────────────────────────────────────────────────
num_epochs: 50             # intentionally high — we WANT to see the overfit curve.
                           # train F1 vs val F1 divergence reveals the optimal epoch.
                           # Use epoch_metrics.jsonl + the end-of-run table to pick the
                           # best checkpoint for the final E2 evaluation.
learning_rate: 2.0e-4          # LoRA + ScoreHead params only
weight_decay: 0.01
warmup_ratio: 0.1              # fraction of total steps used for linear warmup
gradient_accumulation_steps: 8 # effective batch = 1 clip × 8 steps = 8
max_grad_norm: 1.0
seed: 42

# ── LR scheduler ─────────────────────────────────────────────
lr_scheduler: "cosine"         # cosine decay after warmup plateau

# ── Checkpointing ────────────────────────────────────────────
output_dir: "outputs/checkpoints/e2_lora_100clips"
save_steps: 50                 # save a checkpoint every N optimizer steps
save_total_limit: 3            # keep only the latest 3 checkpoints

# ── Validation ───────────────────────────────────────────────
# Stratified 80/20 split of the teacher JSONL (seeded, reproducible).
# After every epoch: ScoreHead forward on val clips → F1 + AP (no generation).
# Results written to epoch_metrics.jsonl for plotting.
val_split: 0.2                 # fraction of clips held out for validation
validate_every_n_epochs: 1     # run val loop every N epochs (1 = every epoch)

# ── Logging ──────────────────────────────────────────────────
log_steps: 10                  # print loss summary every N optimizer steps

# ── DataLoader ───────────────────────────────────────────────
dataloader_num_workers: 0      # 0 avoids tokenizer-pickling issues on all platforms
