# =============================================================================
# e4_stageA.yaml  —  BADAS-Open scorer reproduction (Stage A of e4_vjepa_reason)
# =============================================================================
# Goal: load nexar-ai/BADAS-Open, score our Nexar test halves (Private 677 +
#       Public 667) with the last-16-frame (~2s) window, confirm AP ~= 0.86.
#
# Data paths (manifest / frames_root / split / output) are passed on the CLI
# (one invocation per split) — see RUNPOD_E4_STAGEA.txt.
# RUN TARGET: RunPod GPU (needs credit). Use --dry_run locally first (no GPU).
# =============================================================================

# ── Model ────────────────────────────────────────────────────────────────────
model:
  hf_repo: "nexar-ai/BADAS-Open"      # official open weights (APSv2)
  use_official_loader: true           # badas_loader.py from the HF repo

# ── Preprocessing ────────────────────────────────────────────────────────────
# CONFIRMED 2026-06-24 from badas/core/preprocessing.py on RunPod:
#   - img_size = 256 (VideoPreprocessor default)
#   - resize = squash (cv2.resize to (256,256), no crop)
#   - norm = ImageNet (IMAGENET_MEAN/STD constants in preprocessing.py)
# badas package does NOT expose a top-level frame_transform / build_transform,
# so manual fallback is used — values below are confirmed correct.
preprocess:
  source: "manual"     # badas has no top-level transform fn; manual values confirmed correct
  img_size: 224        # CONFIRMED: badas_loader.py VJEPAModel(img_size=224)
  num_frames: 16
  target_fps: 8
  norm_mean: [0.485, 0.456, 0.406]   # CONFIRMED: IMAGENET_MEAN in preprocessing.py
  norm_std:  [0.229, 0.224, 0.225]   # CONFIRMED: IMAGENET_STD in preprocessing.py

# ── Data fields (paths come from the CLI) ────────────────────────────────────
# Preprocessing is squash-resize (not crop), so hires or pre-squashed frames
# are equivalent. We use hires (1280x720) as the source.
#   Private: --manifest test_manifest_hires.jsonl        --frames_root /workspace/data/test_HiRes
#   Public:  --manifest test_manifest_public_hires.jsonl --frames_root /workspace/data/test_public
data:
  frame_filename_pattern: "frame_{:05d}.jpg"
  gt_field:    "event_occurs"   # 1 = collision, 0 = none
  group_field: "group"
  verdict_threshold: 0.5        # collision_verdict = YES if score >= this

# ── Acceptance ───────────────────────────────────────────────────────────────
acceptance:
  expected_ap: 0.86      # BADAS-Open Nexar AP (BADAS-1.0 Table 3)
  ap_tolerance: 0.03     # flag if |AP - 0.86| > tol -> likely a preprocessing bug
